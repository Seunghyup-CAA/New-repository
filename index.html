    function setLang(lang) {
      const t = T[lang];
      document.documentElement.lang = lang;
      document.getElementById('btnKo').classList.toggle('active', lang === 'ko');
      document.getElementById('btnEn').classList.toggle('active', lang === 'en');

      document.getElementById('badge').textContent = t.badge;
      const brand = document.getElementById('brand');
      brand.textContent = t.brand;
      brand.style.display = lang === 'ko' ? 'block' : 'none';

      const title = document.getElementById('title');
      title.textContent = t.title;
      title.classList.toggle('en', lang === 'en');

      const subtitle = document.getElementById('subtitle');
      subtitle.textContent = t.subtitle;
      subtitle.classList.toggle('en', lang === 'en');

      document.getElementById('heroDesc').textContent = t.heroDesc;
      document.getElementById('byline').style.display = lang === 'en' ? 'block' : 'none';

      cover.src = lang === 'ko' ? 'cover.png' : 'cover_en.png';
      cover.alt = t.title;

      document.getElementById('aboutTitle').textContent = t.aboutTitle;
      document.getElementById('aboutShort').textContent = t.aboutShort;
      document.getElementById('moreLabel').textContent = t.more;
